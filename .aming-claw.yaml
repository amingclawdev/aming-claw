version: 1
project_id: "aming-claw"
name: "Aming Claw"
language: "python"

testing:
  unit_command: "python -m pytest agent/tests/ -q --tb=short"
  e2e_command: "bash scripts/e2e-task-test.sh"
  allowed_commands:
    - executable: "python"
      args_prefixes: ["-m pytest", "-m unittest"]
    - executable: "bash"
      args_prefixes: ["scripts/e2e-"]
    - executable: "node"
      args_prefixes: ["frontend/dashboard/scripts/e2e-trunk.mjs"]
  e2e:
    auto_run: false
    default_timeout_sec: 900
    max_parallel: 1
    require_clean_worktree: true
    evidence_retention_days: 14
    suites:
      dashboard.semantic.safe:
        label: "Dashboard semantic trunk safe path"
        command: "node frontend/dashboard/scripts/e2e-trunk.mjs --reset --skip-dashboard"
        auto_run: false
        live_ai: false
        mutates_db: true
        requires_human_approval: false
        isolation_project: "dashboard-e2e-fixture"
        timeout_sec: 900
        trigger:
          paths:
            - "agent/governance/**"
            - "agent/project_config.py"
            - "frontend/dashboard/**"
          tags:
            - "dashboard"
            - "semantic"
            - "graph"
      dashboard.semantic.live.reject:
        label: "Dashboard live semantic reject path"
        command: "node frontend/dashboard/scripts/e2e-trunk.mjs --reset --semantic-live --semantic-decision reject --skip-dashboard"
        auto_run: false
        live_ai: true
        mutates_db: true
        requires_human_approval: true
        isolation_project: "dashboard-e2e-fixture"
        timeout_sec: 1800
        trigger:
          paths:
            - "agent/governance/semantic_worker.py"
            - "agent/governance/reconcile_feedback.py"
            - "agent/governance/graph_events.py"
            - "frontend/dashboard/src/views/ReviewQueueView.tsx"
          tags:
            - "semantic-review"
            - "reject"
      dashboard.semantic.live.accept:
        label: "Dashboard live semantic accept path"
        command: "node frontend/dashboard/scripts/e2e-trunk.mjs --reset --semantic-live --semantic-decision accept --skip-dashboard"
        auto_run: false
        live_ai: true
        mutates_db: true
        requires_human_approval: true
        isolation_project: "dashboard-e2e-fixture"
        timeout_sec: 1800
        trigger:
          paths:
            - "agent/governance/semantic_worker.py"
            - "agent/governance/reconcile_semantic_enrichment.py"
            - "frontend/dashboard/src/components/InspectorDrawer.tsx"
          tags:
            - "semantic-review"
            - "accept"
      dashboard.static.production:
        label: "Dashboard production static route"
        command: "node frontend/dashboard/scripts/e2e-trunk.mjs --probe --static-route --build-dashboard --dashboard http://localhost:40000/dashboard"
        auto_run: false
        live_ai: false
        mutates_db: false
        requires_human_approval: false
        isolation_project: "aming-claw"
        timeout_sec: 300
        trigger:
          paths:
            - "agent/governance/server.py"
            - "frontend/dashboard/**"
          tags:
            - "dashboard"
            - "static-route"
            - "production"

build:
  command: ""
  release_checks: []

deploy:
  strategy: "docker"
  service_rules:
    - patterns: ["docs/**", "tests/**", "*.md", "*.txt"]
      services: []
    - patterns: ["scripts/**"]
      services: ["all"]
    - patterns: ["agent/utils.py", "agent/i18n.py", "agent/workspace*.py"]
      services: ["executor", "governance"]
    - patterns: ["agent/governance/**"]
      services: ["governance"]
    - patterns: ["agent/telegram_gateway/**"]
      services: ["gateway"]
    - patterns: ["agent/executor.py", "agent/task_*.py", "agent/ai_lifecycle.py", "agent/parallel_dispatcher.py"]
      services: ["executor"]
    - patterns: ["docker-compose*.yml", "Dockerfile*"]
      services: ["all"]
  commands:
    executor:
      restart: "signal"
      health: "http://localhost:40100/status"
    governance:
      restart: "docker compose -f docker-compose.governance.yml build governance && docker compose -f docker-compose.governance.yml up -d governance"
      health: "http://localhost:40000/api/health"
    gateway:
      restart: "docker compose -f docker-compose.governance.yml restart telegram-gateway"
  smoke_test:
    - name: "executor"
      type: "http"
      url: "http://localhost:40100/status"
    - name: "governance"
      type: "http"
      url: "http://localhost:40000/api/health"
    - name: "gateway"
      type: "docker"
      container: "aming_claw-telegram-gateway-1"

governance:
  enabled: true
  test_tool_label: "pytest"
  exclude_roots:
    - "examples"

graph:
  exclude_paths:
    - "examples"
    - "docs/dev"
    - ".worktrees"
    - ".claude/worktrees"
  ignore_globs:
    - "**/node_modules/**"
    - "**/.next/**"
    - "**/dist/**"
    - "**/build/**"
  nested_projects:
    mode: "exclude"
    roots:
      - "examples"

ai:
  routing:
    pm:
      provider: "openai"
      model: "gpt-5.5"
    dev:
      provider: "openai"
      model: "gpt-5.5"
    tester:
      provider: "openai"
      model: "gpt-5.4"
    qa:
      provider: "openai"
      model: "gpt-5.5"
    semantic:
      provider: "anthropic"
      model: "claude-opus-4-7"
