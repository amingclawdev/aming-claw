worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Docker DNS resolver (for dynamic upstream resolution)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # --- Production upstream (static) ---
    upstream governance {
        server governance:30006;
    }

    # --- Main server ---
    server {
        listen 80;
        server_name _;

        # Health check (nginx itself)
        location /nginx-health {
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # Governance API (production)
        location /api/ {
            proxy_pass http://governance/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # Governance API (dev) - uses variable so nginx doesn't fail if dev is down
        location /dev/api/ {
            set $dev_upstream governance-dev:30007;
            proxy_pass http://$dev_upstream/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # Default: 404
        location / {
            return 404 '{"error":"not_found","message":"Use /api/ for governance"}';
            add_header Content-Type application/json;
        }
    }
}
