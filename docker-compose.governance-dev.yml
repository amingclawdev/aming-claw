services:
  # Docker governance-dev has been retired. Keep this file only for optional
  # development dependencies that still benefit from containers.

  redis-dev:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
