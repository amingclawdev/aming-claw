version: "3.8"

services:
  governance:
    build:
      context: .
      dockerfile: Dockerfile.governance
    ports:
      - "30006:30006"
    volumes:
      - governance-data:/app/shared-volume/codex-tasks/state/governance
      - ${WORKSPACE_PATH:-./}:/workspace:ro
    environment:
      - GOVERNANCE_PORT=30006
      - REDIS_URL=redis://redis:6379/0
      - SHARED_VOLUME_PATH=/app/shared-volume
      - GOVERNANCE_ADMIN_SECRET=${GOVERNANCE_ADMIN_SECRET:-default-dev-secret}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  governance-data:
    driver: local
  redis-data:
    driver: local
